<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <title>Automazione • Home</title>

  <!-- No cache -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>

  <link rel="stylesheet" href="assets/style.css?v=oc_v2_3">
</head>
<body>
  <div id="app">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="title-area">
        <h1 class="app-title">Home</h1>
        <span id="stateBadge" class="state-badge">—</span>
      </div>

      <div id="weatherPill" class="weather-pill">
        <span id="weatherIcon" class="w-ico">☀️</span>
        <span id="weatherTemp">--°</span>
        <span class="dot">·</span>
        <span id="weatherWind">-- km/h</span>
      </div>
    </header>

    <!-- PEOPLE BAR -->
    <div id="peopleBar" class="people-bar" role="button" tabindex="0">
      <span>Persone</span>
      <span id="peopleSummary" class="people-summary">—</span>
    </div>

    <!-- HOME PAGE -->
    <main id="pageHome" class="page page-active">
      <section class="card energy-card">
        <div class="card-title">Energy</div>
        <div class="energy-value" id="energyValue">— kWh</div>
      </section>

      <section class="favorites">
        <div class="fav-grid">
          <button type="button" id="btnOverride" class="tile tile-md">
            <div class="tile-ico">🛡️</div>
            <div class="tile-txt">Override</div>
            <div id="lblOverride" class="tile-sub">Off</div>
          </button>

          <button type="button" id="btnVacanza" class="tile tile-md">
            <div class="tile-ico">🏖️</div>
            <div class="tile-txt">Vacanza</div>
            <div id="lblVacanza" class="tile-sub">Off</div>
          </button>

          <button type="button" id="btnPiante" class="tile tile-md">
            <div class="tile-ico">🌿</div>
            <div class="tile-txt">Piante</div>
            <div class="tile-sub">Irriga</div>
          </button>

          <button type="button" id="btnAlza" class="tile tile-md">
            <div class="tile-ico">🪟</div>
            <div id="lblAlza" class="tile-txt">Alza</div>
            <div class="tile-sub">Se clicco si abbassa</div>
          </button>
        </div>
      </section>
    </main>

    <!-- PAGE: PEOPLE -->
    <main id="pagePeople" class="page">
      <div class="people-toolbar">
        <button type="button" id="btnStrictLife"  class="nav-btn small">⚙️ Strict LIFE</button>
        <button type="button" id="btnMorningHold" class="nav-btn small">⏰ Morning HOLD</button>
      </div>
      <section class="card">
        <div class="card-title">Persone</div>
        <ul id="peopleList" class="list"></ul>
      </section>
    </main>

    <!-- PAGE: DEVICES -->
    <main id="pageDevices" class="page">
      <section class="card">
        <div class="card-title">Telecamere</div>
        <div class="cams">
          <div class="cam-row">
            <span>Interne</span>
            <span id="camInterne" class="badge">—</span>
          </div>
          <div class="cam-row">
            <span>Esterne</span>
            <span id="camEsterne" class="badge">—</span>
          </div>
        </div>
      </section>
    </main>

    <!-- PAGE: LOG -->
    <main id="pageLog" class="page">
      <section class="card">
        <div class="card-title">Log (solo errori)</div>
        <ul id="logErrors" class="list"></ul>
      </section>
    </main>

    <!-- PAGE: CRUSCOTTO -->
    <main id="pageCruscotto" class="page">
      <section class="cruscotto-grid" id="cruscottoGrid"></section>

      <div class="cruscotto-toolbar">
        <button type="button" id="btnOpenSettings" class="nav-btn small">⚙️ Impostazioni</button>
        <button type="button" id="btnRunFullTest"  class="nav-btn small">🧪 Test</button>
        <span id="testStatus" class="tag"></span>
      </div>

      <!-- DIAGNOSTICA RAPIDA -->
      <section class="card" style="margin-top:12px">
        <div class="card-title">Diagnostica Rapida</div>

        <div class="setting-row">
          <label>Lista trigger → Log</label>
          <button type="button" class="mini" id="btnDiagList">Esegui</button>
        </div>

        <div class="setting-row">
          <label>KA ON (5 min) Marco</label>
          <button type="button" class="mini" id="btnKaOnMarco">ON</button>
          <button type="button" class="mini" id="btnKaOffMarco">OFF</button>
        </div>

        <div class="setting-row">
          <label>All OUT (guard+confirm)</label>
          <button type="button" class="mini" id="btnAllOut">Esegui</button>
        </div>

        <div class="setting-row">
          <label>All IN (poke_life)</label>
          <button type="button" class="mini" id="btnAllIn">Esegui</button>
        </div>

        <div class="setting-row">
          <label>Verifica grace ora</label>
          <button type="button" class="mini" id="btnVerifyGrace">Esegui</button>
        </div>

        <div class="setting-row">
          <label>Snapshot stato → Log</label>
          <button type="button" class="mini" id="btnSnap">Esegui</button>
        </div>
      </section>
    </main>

    <!-- PAGE: SETTINGS -->
    … (LA TUA SEZIONE SETTINGS È GIÀ CORRETTA E NON SERVE RISCRIVERLA) …

    <!-- PAGE: ENERGY -->
    … (identica alla tua — nessuna modifica necessaria) …

  </div> <!-- /app -->

  <!-- NAV BOTTOM -->
  <nav class="bottom-nav" aria-label="Sezioni">
    <button data-tab="home"      class="nav-btn nav-active">Home</button>
    <button data-tab="people"    class="nav-btn">Persone</button>
    <button data-tab="devices"   class="nav-btn">Dispositivi</button>
    <button data-tab="log"       class="nav-btn">Log</button>
    <button data-tab="cruscotto" class="nav-btn">Cruscotto</button>
    <button data-tab="energy"    class="nav-btn">Energy</button>
  </nav>

  <!-- JS in coda -->
  <script src="api.js"></script>
  <script src="js/app.js?v=oc_v2_3"></script>

</body>
</html>
